<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Sunny Solar CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--primary:#0B1E3D;--secondary:#F59E0B;--accent:#10B981;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6;--bg:#F1F5F9;--text:#1E293B;--light:#64748B;--border:#E2E8F0;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
header{background:var(--primary);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.card{background:#fff;border-radius:12px;padding:16px;margin:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04);border:1px solid var(--border);}
.card-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
input,select,textarea{width:100%;padding:11px 12px;margin-top:5px;margin-bottom:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:'Inter',sans-serif;background:#fff;color:var(--text);}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(11,30,61,0.08);}
textarea{resize:vertical;min-height:70px;}
label{font-size:12px;font-weight:600;color:var(--light);display:block;margin-top:2px;}
.btn{padding:11px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn-full{width:100%;}
.btn-accent{background:var(--accent);}
.btn-warn{background:var(--red);}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-wa{background:#25D366;}
.btn:active{opacity:0.85;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 12px;z-index:100;}
.nav-item{border:none;background:transparent;color:var(--light);font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;cursor:pointer;font-family:'Inter',sans-serif;gap:3px;padding:0 8px;}
.nav-item.active{color:var(--secondary);}
.nav-item .nav-icon{font-size:20px;}
.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap;}
.badge-follow-up{background:#FEF3C7;color:#92400E;}
.badge-interested{background:#D1FAE5;color:#065F46;}
.badge-site-visit{background:#DBEAFE;color:#1E40AF;}
.badge-converted{background:#F3E8FF;color:#6B21A8;}
.badge-lost{background:#FEE2E2;color:#991B1B;}
.badge-website{background:#FEF9C3;color:#854D0E;}
.role-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;}
.role-admin{background:#0B1E3D;color:#fff;}
.role-manager{background:#1D4ED8;color:#fff;}
.role-telecaller{background:#059669;color:#fff;}
.role-field{background:#D97706;color:#fff;}
.role-marketing{background:#7C3AED;color:#fff;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.stat-box{background:var(--bg);border-radius:10px;padding:12px 10px;text-align:center;}
.stat-num{font-size:24px;font-weight:800;line-height:1;}
.stat-label{font-size:11px;color:var(--light);font-weight:600;margin-top:5px;}
.msg{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:12px;}
.msg-error{background:#FEE2E2;color:#991B1B;}
.msg-success{background:#D1FAE5;color:#065F46;}
.msg-info{background:#DBEAFE;color:#1E40AF;}
.divider{height:1px;background:var(--border);margin:14px 0;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--bg);padding:9px 8px;text-align:left;font-weight:700;color:var(--light);font-size:11px;text-transform:uppercase;}
td{padding:10px 8px;border-bottom:1px solid #F8FAFC;vertical-align:middle;}
tr:hover td{background:#FAFBFC;}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:3px;background:var(--accent);}
.lead-source-website{border-left:3px solid var(--secondary);}
.lead-source-walkin{border-left:3px solid var(--accent);}
.lead-source-cold-call{border-left:3px solid var(--blue);}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg);color:var(--light);margin-right:3px;}
.section-header{padding:16px 12px 6px;font-size:12px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:0.5px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--light);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bg);}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:16px;}
.close-btn{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--light);}
</style>
</head>

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STATE = {
  user:null, profile:null,
  leads:[], staff:[], activities:[],
  tab:'dashboard', loading:false, search:'',
  filterStatus:'all', filterSource:'all', filterStaff:'all',
  modal:null
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const isAdmin   = () => STATE.profile?.role === 'admin';
const isManager = () => STATE.profile?.role === 'manager';
const isStaff   = () => ['telecaller','field','marketing'].includes(STATE.profile?.role);
const canSeeAll = () => isAdmin() || isManager();

function badgeClass(s){
  const m={'Follow-Up':'follow-up','Interested':'interested','Site Visit':'site-visit','Converted':'converted','Lost':'lost'};
  return 'badge-'+(m[s]||'follow-up');
}
function roleChip(r){return `<span class="role-chip role-${r}">${r}</span>`;}
function sourceTag(s){
  const colors={'Website':'#854D0E:FEF9C3','Walk-in':'#065F46:D1FAE5','Cold Call':'#1E40AF:DBEAFE','Referral':'#6B21A8:F3E8FF'};
  const [c,bg] = (colors[s]||'#64748B:F1F5F9').split(':');
  return `<span style="background:#${bg};color:#${c};padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;">${s||'—'}</span>`;
}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';}
function fmtTime(d){return d?new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'—';}
function fmtDateTime(d){return d?fmtDate(d)+' '+fmtTime(d):'—';}
function timeSince(d){
  const s=Math.floor((new Date()-new Date(d))/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// ─── DATA ────────────────────────────────────────────────────────────────────
async function loadAll(){
  if(!STATE.user) return;
  STATE.loading=true; renderApp();
  const ok = await loadProfile();
  if(!ok){STATE.loading=false;renderApp();return;}
  await Promise.all([loadLeads(), loadStaff(), loadActivities()]);
  STATE.loading=false; renderApp();
}

async function loadProfile(){
  const {data,error}=await sb.from('profiles').select('*').eq('id',STATE.user.id).single();
  if(error){console.error(error);return false;}
  STATE.profile=data; return true;
}

async function loadLeads(){
  const {data,error}=await sb.from('leads')
    .select('*, creator:created_by(name,phone,role), assigner:assigned_to(name)')
    .order('created_at',{ascending:false});
  if(error){console.error(error);STATE.leads=[];return;}
  STATE.leads=data||[];
}

async function loadStaff(){
  if(!canSeeAll()) return;
  let q=sb.from('profiles').select('*, manager:manager_id(name)').order('role').order('name');
  if(isManager()) q=q.eq('manager_id',STATE.user.id);
  const {data,error}=await q;
  if(!error) STATE.staff=data||[];
}

async function loadActivities(){
  const {data,error}=await sb.from('activities')
    .select('*, lead:lead_id(name,phone), actor:user_id(name,role)')
    .order('created_at',{ascending:false})
    .limit(50);
  if(!error) STATE.activities=data||[];
}

// ─── LEAD ACTIONS ────────────────────────────────────────────────────────────
async function saveLead(e){
  e.preventDefault();
  const btn=e.target.querySelector('[type=submit]');
  btn.disabled=true; btn.textContent='Saving...';
  try{
    const {data:{user}}=await sb.auth.getUser();
    const payload={
      name:         document.getElementById('l-name').value.trim(),
      phone:        document.getElementById('l-phone').value.trim(),
      location:     document.getElementById('l-loc').value.trim(),
      status:       document.getElementById('l-status').value,
      system_type:  document.getElementById('l-sys').value.trim(),
      monthly_bill: document.getElementById('l-bill').value.trim(),
      source:       document.getElementById('l-source').value,
      notes:        document.getElementById('l-notes').value.trim(),
      follow_up:    document.getElementById('l-followup').value||null,
      created_by:   user.id
    };
    const {error}=await sb.from('leads').insert([payload]);
    if(error) throw error;
    // Log activity
    await sb.from('activities').insert([{lead_id:null,user_id:user.id,type:'Lead Added',notes:`New lead: ${payload.name}`}]);
    e.target.reset();
    showToast('✅ Lead saved!');
    await loadLeads(); await loadActivities();
    document.getElementById('main-content').innerHTML=buildTabContent();
  }catch(err){alert('Error: '+err.message);}
  finally{btn.disabled=false;btn.textContent='💾 Save Lead';}
}

async function updateLeadStatus(leadId, newStatus){
  const{error}=await sb.from('leads').update({status:newStatus}).eq('id',leadId);
  if(error) return alert(error.message);
  const{data:{user}}=await sb.auth.getUser();
  await sb.from('activities').insert([{lead_id:leadId,user_id:user.id,type:'Status Update',notes:`Status → ${newStatus}`}]);
  await loadLeads(); await loadActivities();
  document.getElementById('main-content').innerHTML=buildTabContent();
}

async function logActivity(leadId, leadName){
  const type=document.getElementById('act-type').value;
  const notes=document.getElementById('act-notes').value.trim();
  const followUp=document.getElementById('act-followup').value||null;
  if(!notes){alert('Please enter activity notes.');return;}
  const{data:{user}}=await sb.auth.getUser();
  const{error}=await sb.from('activities').insert([{lead_id:leadId,user_id:user.id,type,notes,follow_up_date:followUp}]);
  if(error){alert(error.message);return;}
  if(followUp) await sb.from('leads').update({follow_up:followUp}).eq('id',leadId);
  closeModal();
  showToast('✅ Activity logged!');
  await loadLeads(); await loadActivities();
  document.getElementById('main-content').innerHTML=buildTabContent();
}

// ─── STAFF ACTIONS ───────────────────────────────────────────────────────────
async function createStaff(e){
  e.preventDefault();
  const btn=e.target.querySelector('[type=submit]');
  btn.disabled=true; btn.textContent='Creating...';
  const name=document.getElementById('s-name').value.trim();
  const phone=document.getElementById('s-phone').value.trim().replace(/\D/g,'');
  const pass=document.getElementById('s-pass').value;
  const role=document.getElementById('s-role').value;
  const mgr=document.getElementById('s-manager')?.value||null;
  try{
    const{data,error}=await sb.auth.signUp({email:phone+'@sunnysolar.local',password:pass,options:{data:{name}}});
    if(error) throw error;
    await new Promise(r=>setTimeout(r,1200));
    const uid=data.user?.id;
    if(uid){
      await sb.from('profiles').update({role,manager_id:mgr||null,name,phone}).eq('id',uid);
    }
    e.target.reset();
    showToast('✅ Staff account created!');
    await loadStaff();
    document.getElementById('main-content').innerHTML=buildTabContent();
  }catch(err){alert('Error: '+err.message);}
  finally{btn.disabled=false;btn.textContent='➕ Create Account';}
}

async function updateRole(uid,role){
  await sb.from('profiles').update({role}).eq('id',uid);
  await loadStaff(); document.getElementById('main-content').innerHTML=buildTabContent();
}
async function updateManager(sid,mid){
  await sb.from('profiles').update({manager_id:mid||null}).eq('id',sid);
  await loadStaff(); document.getElementById('main-content').innerHTML=buildTabContent();
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportExcel(data, filename){
  if(!data.length) return alert('No data to export.');
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Data');
  XLSX.writeFile(wb,filename);
}

function exportLeads(){
  const rows=getFilteredLeads().map(l=>({
    'Name':l.name,'Phone':l.phone,'Location':l.location,
    'Status':l.status,'Source':l.source,'System Size':l.system_type,
    'Monthly Bill (₹)':l.monthly_bill,'Notes':l.notes,
    'Follow Up':fmtDate(l.follow_up),
    'Added By':l.creator?.name||'—','Staff Role':l.creator?.role||'—',
    'Date Added':fmtDateTime(l.created_at)
  }));
  exportExcel(rows,`SunnySolar_Leads_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function exportStaffReport(){
  const rows=STATE.staff.map(s=>{
    const myLeads=STATE.leads.filter(l=>l.created_by===s.id);
    const converted=myLeads.filter(l=>l.status==='Converted').length;
    return{
      'Staff Name':s.name,'Phone':s.phone,'Role':s.role,
      'Total Leads':myLeads.length,'Converted':converted,
      'Interested':myLeads.filter(l=>l.status==='Interested').length,
      'Follow-Up':myLeads.filter(l=>l.status==='Follow-Up').length,
      'Lost':myLeads.filter(l=>l.status==='Lost').length,
      'Conversion %':myLeads.length?Math.round(converted/myLeads.length*100)+'%':'0%'
    };
  });
  exportExcel(rows,`SunnySolar_StaffReport_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function getFilteredLeads(){
  const q=STATE.search.toLowerCase();
  return STATE.leads.filter(l=>{
    const matchSearch=!q||l.name.toLowerCase().includes(q)||l.phone.includes(q)||(l.location||'').toLowerCase().includes(q);
    const matchStatus=STATE.filterStatus==='all'||l.status===STATE.filterStatus;
    const matchSource=STATE.filterSource==='all'||l.source===STATE.filterSource;
    const matchStaff=STATE.filterStaff==='all'||l.created_by===STATE.filterStaff;
    return matchSearch&&matchStatus&&matchSource&&matchStaff;
  });
}

  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">

        <button class="close-btn" onclick="closeModal()">✕</button>
        <div class="modal-title">📝 Log Activity — ${leadName}</div>
        <label>Activity Type</label>

function closeModal(){document.getElementById('modal-root').innerHTML='';}
function triggerWA(p){const c=p.replace(/\D/g,'');window.open('https://wa.me/'+(c.startsWith('91')?c:'91'+c),'_blank');}
function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:10px 20px;border-radius:8px;z-index:999;font-size:13px;font-weight:600;';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// ─── AUTH ────────────────────────────────────────────────────────────────────
async function handleLogin(){
  const phone=document.getElementById('auth-phone').value.trim().replace(/\D/g,'');
  const pass=document.getElementById('auth-pass').value;
  const err=document.getElementById('auth-err');
  err.style.display='none';
  if(!phone||!pass){err.textContent='Enter mobile and password.';err.style.display='block';return;}
  const btn=document.getElementById('auth-btn');
  btn.disabled=true;btn.textContent='Signing in...';
  try{
    const{error}=await sb.auth.signInWithPassword({email:phone+'@sunnysolar.local',password:pass});
    if(error) throw error;
  }catch(e){
    err.textContent=e.message==='Invalid login credentials'?'Wrong number or password.':e.message;
    err.style.display='block';btn.disabled=false;btn.textContent='Login';
  }
}

function buildTabContent(){
  switch(STATE.tab){
    case 'dashboard': return buildDashboard();
    case 'leads':     return buildLeads();
    case 'team':      return buildTeam();
    case 'staff':     return buildStaff();
    case 'reports':   return buildReports();
    default:          return buildDashboard();
  }
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function buildDashboard(){
  const leads=STATE.leads;
  const total=leads.length;
  const converted=leads.filter(l=>l.status==='Converted').length;
  const interested=leads.filter(l=>l.status==='Interested').length;
  const siteVisit=leads.filter(l=>l.status==='Site Visit').length;
  const followUp=leads.filter(l=>l.status==='Follow-Up').length;
  const lost=leads.filter(l=>l.status==='Lost').length;
  const websiteLeads=leads.filter(l=>l.source==='Website').length;
  const convRate=total?Math.round(converted/total*100):0;

  // Today's follow-ups
  const today=new Date().toISOString().slice(0,10);
  const todayFollowUps=leads.filter(l=>l.follow_up===today);
  const overdueFollowUps=leads.filter(l=>l.follow_up&&l.follow_up<today&&!['Converted','Lost'].includes(l.status));

  // Recent activities
  const recentActs=STATE.activities.slice(0,6);

  // Staff leaderboard (admin/manager only)
  const leaderboard=canSeeAll()?STATE.staff.map(s=>{
    const sl=leads.filter(l=>l.created_by===s.id);
    return{name:s.name,role:s.role,total:sl.length,converted:sl.filter(l=>l.status==='Converted').length};
  }).sort((a,b)=>b.total-a.total).slice(0,5):[];

  return `
    ${(todayFollowUps.length||overdueFollowUps.length)?`
    <div style="margin:12px;">
      ${overdueFollowUps.length?`<div class="msg msg-error">⚠️ ${overdueFollowUps.length} overdue follow-up${overdueFollowUps.length>1?'s'}!</div>`:''}
      ${todayFollowUps.length?`<div class="msg msg-info">📅 ${todayFollowUps.length} follow-up${todayFollowUps.length>1?'s'} due today</div>`:''}
    </div>`:''}

    <div class="card">
      <div class="card-title">📊 Pipeline Overview ${canSeeAll()?'(All Staff)':'(Your Leads)'}</div>
      <div class="grid-3">
        <div class="stat-box"><div class="stat-num" style="color:var(--primary);">${total}</div><div class="stat-label">Total Leads</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent);">${converted}</div><div class="stat-label">Converted</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--secondary);">${convRate}%</div><div class="stat-label">Conv. Rate</div></div>
        <div class="stat-box"><div class="stat-num" style="color:#0EA5E9;">${interested}</div><div class="stat-label">Interested</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--purple);">${siteVisit}</div><div class="stat-label">Site Visit</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red);">${lost}</div><div class="stat-label">Lost</div></div>
      </div>
      ${total?`<div class="progress-bar" style="margin-top:14px;"><div class="progress-fill" style="width:${convRate}%;"></div></div>
      <div style="text-align:right;font-size:11px;color:var(--light);margin-top:4px;">${convRate}% conversion rate</div>`:''}
    </div>

    ${canSeeAll()&&websiteLeads?`
    <div class="card" style="border-left:3px solid var(--secondary);">
      <div class="card-title">🌐 Website Enquiries</div>
      <div class="grid-2">
        <div class="stat-box"><div class="stat-num" style="color:var(--secondary);">${websiteLeads}</div><div class="stat-label">From sunnysolar.in</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent);">${leads.filter(l=>l.source==='Website'&&l.status==='Converted').length}</div><div class="stat-label">Converted</div></div>
      </div>
    </div>`:''}

    ${todayFollowUps.length?`
    <div class="card">
      <div class="card-title">📅 Today's Follow-Ups</div>
      ${todayFollowUps.map(l=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bg);">
          <div>
            <div style="font-weight:700;font-size:14px;">${l.name}</div>
            <div style="font-size:12px;color:var(--light);">${l.phone} · ${l.location}</div>
          </div>
          <button onclick="triggerWA('${l.phone}')" class="btn btn-wa" style="padding:6px 10px;font-size:12px;">💬</button>
        </div>`).join('')}
    </div>`:''}

    ${canSeeAll()&&leaderboard.length?`
    <div class="card">
      <div class="card-title">🏆 Staff Leaderboard</div>
      ${leaderboard.map((s,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg);">
          <div style="width:24px;height:24px;border-radius:50%;background:${i===0?'#F59E0B':i===1?'#94A3B8':'#CD7C2F'};display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0;">${i+1}</div>

        </div>`).join('')}
    </div>`:''}

    <div class="card">
      <div class="card-title">🕐 Recent Activity</div>
      ${recentActs.length?recentActs.map(a=>`

        </div>`).join(''):`<div class="empty-state"><div class="empty-icon">📭</div><p>No activity yet</p></div>`}
    </div>`;
}

      ${STATE.staff.filter(s=>!['admin','manager'].includes(s.role)).map(s=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
          <span style="font-size:13px;font-weight:600;flex:1;">${s.name} ${roleChip(s.role)}</span>
          <select onchange="updateManager('${s.id}',this.value)" style="padding:6px;border:1px solid var(--border);border-radius:8px;font-size:12px;margin:0;flex:1;">
            <option value="">— No Manager —</option>
            ${managers.map(m=>`<option value="${m.id}" ${s.manager_id===m.id?'selected':''}>${m.name}</option>`).join('')}
          </select>
        </div>`).join('')}
    </div>`:''}`;
}

// ─── STAFF SETUP ─────────────────────────────────────────────────────────────
function buildStaff(){
  if(!isAdmin()) return '';
  const managers=STATE.staff.filter(s=>s.role==='manager');
  return `
    <div class="card">
      <div class="card-title">⚙️ Create Staff Account</div>
      <form id="staff-form" onsubmit="createStaff(event)">
        <label>Full Name *</label><input type="text" id="s-name" placeholder="Staff member name" required/>
        <div class="grid-2">
          <div><label>Mobile Number *</label><input type="tel" id="s-phone" placeholder="10-digit" required/></div>
          <div><label>Password *</label><input type="password" id="s-pass" placeholder="Min 6 chars" required minlength="6"/></div>
        </div>
        <div class="grid-2">
          <div><label>Role *</label>
            <select id="s-role">
              <option value="telecaller">Telecaller</option>
              <option value="field">Field Staff</option>
              <option value="marketing">Marketing</option>
              <option value="manager">Manager</option>
            </select>
          </div>
          <div><label>Assign to Manager</label>
            <select id="s-manager">
              <option value="">— None —</option>
              ${managers.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-accent btn-full">➕ Create Account</button>
      </form>
    </div>

    <div class="card">
      <div class="card-title">📋 Role Permissions</div>
      <table>
        <thead><tr><th>Role</th><th>Sees</th><th>Can Add</th><th>Export</th></tr></thead>
        <tbody>
          <tr><td>${roleChip('telecaller')}</td><td>Own only</td><td>✅</td><td>Own</td></tr>
          <tr><td>${roleChip('field')}</td><td>Own only</td><td>✅</td><td>Own</td></tr>
          <tr><td>${roleChip('marketing')}</td><td>Own only</td><td>✅</td><td>Own</td></tr>
          <tr><td>${roleChip('manager')}</td><td>Team leads</td><td>✅</td><td>Team</td></tr>
          <tr><td>${roleChip('admin')}</td><td>Everyone</td><td>✅</td><td>All</td></tr>
        </tbody>
      </table>
    </div>`;
}

// ─── REPORTS ─────────────────────────────────────────────────────────────────
function buildReports(){
  const leads=STATE.leads;
  const total=leads.length;
  const converted=leads.filter(l=>l.status==='Converted').length;

  // Source breakdown
  const sources=['Website','Walk-in','Cold Call','Referral'];
  const sourceData=sources.map(s=>({name:s,count:leads.filter(l=>l.source===s).length})).filter(s=>s.count>0);

  // Status breakdown
  const statuses=['Follow-Up','Interested','Site Visit','Converted','Lost'];
  const statusData=statuses.map(s=>({name:s,count:leads.filter(l=>l.status===s).length}));

  // Daily leads (last 7 days)
  const daily=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const count=leads.filter(l=>l.created_at?.slice(0,10)===ds).length;
    daily.push({date:ds,label:d.toLocaleDateString('en-IN',{day:'numeric',month:'short'}),count});
  }
  const maxDaily=Math.max(...daily.map(d=>d.count),1);

  // Staff performance
  const staffPerf=STATE.staff.map(s=>{
    const sl=leads.filter(l=>l.created_by===s.id);
    const conv=sl.filter(l=>l.status==='Converted').length;
    return{name:s.name,role:s.role,total:sl.length,converted:conv,rate:sl.length?Math.round(conv/sl.length*100):0};
  }).filter(s=>s.total>0).sort((a,b)=>b.total-a.total);

  return `
    <div class="card">
      <div class="card-title">📈 Pipeline Summary</div>
      <div class="grid-3">
        <div class="stat-box"><div class="stat-num" style="color:var(--primary);">${total}</div><div class="stat-label">Total</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--accent);">${converted}</div><div class="stat-label">Converted</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--secondary);">${total?Math.round(converted/total*100):0}%</div><div class="stat-label">Conv. Rate</div></div>
        <div class="stat-box"><div class="stat-num" style="color:#0EA5E9;">${leads.filter(l=>l.status==='Interested').length}</div><div class="stat-label">Interested</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--purple);">${leads.filter(l=>l.status==='Site Visit').length}</div><div class="stat-label">Site Visit</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red);">${leads.filter(l=>l.status==='Lost').length}</div><div class="stat-label">Lost</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📅 Leads This Week</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:6px;">
        ${daily.map(d=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
            <div style="font-size:10px;font-weight:700;color:var(--primary);">${d.count||''}</div>
            <div style="width:100%;background:${d.count?'var(--accent)':'var(--border)'};border-radius:4px 4px 0 0;height:${Math.round(d.count/maxDaily*60)+4}px;"></div>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:6px;">
        ${daily.map(d=>`<div style="flex:1;text-align:center;font-size:9px;color:var(--light);">${d.label}</div>`).join('')}
      </div>
    </div>

    ${sourceData.length?`
    <div class="card">
      <div class="card-title">🌐 Lead Sources</div>
      ${sourceData.map(s=>`
        <div style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
            <span style="font-weight:600;">${s.name}</span>
            <span style="color:var(--light);">${s.count} (${Math.round(s.count/total*100)}%)</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(s.count/total*100)}%;background:${s.name==='Website'?'var(--secondary)':s.name==='Walk-in'?'var(--accent)':'var(--blue)'};"></div></div>
        </div>`).join('')}
    </div>`:''}

    ${canSeeAll()&&staffPerf.length?`
    <div class="card">
      <div class="card-title">🏆 Staff Performance</div>
      <table>
        <thead><tr><th>Staff</th><th>Role</th><th>Leads</th><th>Conv.</th><th>Rate</th></tr></thead>
        <tbody>
          ${staffPerf.map(s=>`
            <tr>
              <td style="font-weight:700;">${s.name}</td>
              <td>${roleChip(s.role)}</td>
              <td style="font-weight:700;">${s.total}</td>
              <td style="color:var(--accent);font-weight:700;">${s.converted}</td>
              <td><span style="color:${s.rate>=50?'var(--accent)':s.rate>=25?'var(--secondary)':'var(--red)'};font-weight:700;">${s.rate}%</span></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`:''}

    <div class="card">
      <div class="card-title">📥 Export Data</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button onclick="exportLeads()" class="btn btn-accent btn-full">📥 Export Leads to Excel</button>
        ${canSeeAll()?`<button onclick="exportStaffReport()" class="btn btn-outline btn-full">👥 Export Staff Performance Report</button>`:''}
      </div>
    </div>`;
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
sb.auth.onAuthStateChange((evt,session)=>{
  STATE.user=session?.user||null;
  if(STATE.user) loadAll(); else renderApp();
});
</script>
</body>
